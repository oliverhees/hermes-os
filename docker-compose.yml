# Hermes Workspace + Agent — Docker Compose Setup
#
# Requirements:
#   - Docker & Docker Compose
#   - At least one LLM provider key in .env (ANTHROPIC_API_KEY,
#     OPENAI_API_KEY, OPENROUTER_API_KEY, GOOGLE_API_KEY, …) OR a
#     reachable local server (Ollama, LM Studio, etc.)
#
# Quick Start:
#   1. cp .env.example .env
#   2. Add at least one provider key (whichever you use)
#   3. ./scripts/bootstrap.sh
#   4. docker compose up
#   5. Open https://<your-domain>
#
# Images:
#   This file pulls pre-built images by default — no local build required.
#     - nousresearch/hermes-agent:latest  (Hermes Agent, Dockerfile upstream)
#     - ghcr.io/outsourc-e/hermes-workspace:latest  (this workspace)
#
#   To build from source instead (e.g. for development), use:
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Persistent data:
#   The `claude-data` named volume mounts at /opt/data inside the agent
#   container. Config, sessions, skills, memory, and credentials live there
#   and survive container recreation. For host-path mounts see the commented
#   `volumes:` block on the hermes-agent service.
#
# Troubleshooting:
#   - See README.md "Docker" troubleshooting section
#   - Check logs: docker compose logs hermes-agent
#   - Agent must expose port 8642

name: hermes-os

secrets:
  pg_password:
    file: ./.secrets/pg_password
  encryption_key:
    file: ./.secrets/encryption_key
  better_auth_secret:
    file: ./.secrets/better_auth_secret

networks:
  edge: {}
  internal: { internal: true }

volumes:
  pg_data: {}
  caddy_data: {}
  caddy_config: {}
  hermes_agent_data: {}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_DB: hermes_os
      POSTGRES_USER: hermes_os
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: postgres -c ssl=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes_os -d hermes_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: .
      target: migrator
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    secrets: [pg_password]
    command: >
      sh -c "DATABASE_URL=\"postgresql://hermes_os:$$(cat /run/secrets/pg_password)@postgres:5432/hermes_os\" pnpm db:migrate"
    restart: "no"

  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    restart: unless-stopped
    networks: [internal]
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 1
      POST: 1
      DELETE: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    networks: [edge, internal]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - hermes-os

  hermes-os:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    networks: [edge, internal]
    dns: [8.8.8.8, 1.1.1.1]
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DOCKER_HOST: tcp://socket-proxy:2375
      PUBLIC_IP: ${PUBLIC_IP}
      DOMAIN: ${DOMAIN}
      BETTER_AUTH_URL: https://${DOMAIN:-hermesos.paione.de}
      PG_PASSWORD_FILE: /run/secrets/pg_password
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      PGSSLMODE: disable
    secrets:
      - pg_password
      - encryption_key
      - better_auth_secret
    entrypoint:
      - /bin/sh
      - -c
      - |
        export DATABASE_URL="postgresql://hermes_os:$$(cat /run/secrets/pg_password)@postgres:5432/hermes_os"
        export PGSSLMODE=disable
        export ENCRYPTION_KEY="$$(cat /run/secrets/encryption_key)"
        export BETTER_AUTH_SECRET="$$(cat /run/secrets/better_auth_secret)"
        exec /usr/bin/tini -- gosu workspace node --max-old-space-size=2048 server-entry.cjs

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks: [internal]
    volumes:
      - hermes_agent_data:/opt/data
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
